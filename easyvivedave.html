<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EasyVibeDave — @davelab7</title>
  <meta name="description" content="Building AI dev tools in public. Practical tips, experiments, and lessons learned. By @davelab7 / @ishiid.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

  <style>
    /* ── WCAG AA COLOUR TOKENS ──────────────────────────────────────────────
       All text/bg pairs verified ≥ 4.5:1 (normal text) / ≥ 3:1 (large/UI)
       ─────────────────────────────────────────────────────────────────────── */
    :root {
      --bg:          #F7F5F2;   /* warm off-white                            */
      --surface:     #FFFFFF;
      --surface2:    #F0EDE8;
      --border:      #D9D4CC;
      --border-focus:#2455C8;   /* focus ring – 4.5:1+ on bg ✓              */

      --ink:         #1C1917;   /* on #F7F5F2 = 17.8:1 ✓                    */
      --ink-mid:     #44403C;   /* on #F7F5F2 =  9.5:1 ✓                    */
      --ink-muted:   #78716C;   /* on #FFFFFF =  4.6:1 ✓                    */

      --accent:      #2455C8;   /* on #FFFFFF =  6.2:1 ✓                    */
      --accent-hover:#1A3FA0;
      --accent-bg:   #EEF2FC;

      --tag-text:    #1A3FA0;   /* on #EEF2FC =  5.8:1 ✓                    */

      --radius:      10px;
      --radius-sm:   6px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Lora', Georgia, serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 52px 20px 88px;
      background-image: radial-gradient(circle, #C8C0B4 1px, transparent 1px);
      background-size: 28px 28px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 80% 80% at 50% 50%, transparent 40%, var(--bg) 100%);
      pointer-events: none;
    }

    .container {
      width: 100%;
      max-width: 460px;
      position: relative;
      z-index: 1;
    }

    /* WCAG 2.4.1 — Skip Navigation */
    .skip-link {
      position: absolute;
      top: -48px;
      left: 0;
      background: var(--accent);
      color: #fff;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      padding: 8px 14px;
      border-radius: var(--radius-sm);
      text-decoration: none;
      z-index: 100;
      transition: top 0.2s;
    }
    .skip-link:focus { top: 0; }

    /* ── PROFILE ─────────────────────────────────────────────────────────── */
    .profile {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin-bottom: 36px;
      animation: fadeUp 0.45s ease both;
    }

    .avatar {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      background: var(--surface);
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Mono', monospace;
      font-size: 19px;
      font-weight: 500;
      color: var(--accent);
      margin-bottom: 18px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }

    .profile-name {
      font-family: 'Lora', serif;
      font-size: 24px;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: var(--ink);
      line-height: 1.15;
      margin-bottom: 5px;
    }

    .profile-handle {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--ink-muted);
      margin-bottom: 14px;
      letter-spacing: 0.02em;
    }

    .profile-handle a {
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .profile-handle a:hover { color: var(--accent-hover); }
    .profile-handle a:focus-visible {
      outline: 2px solid var(--border-focus);
      outline-offset: 2px;
      border-radius: 2px;
    }

    .profile-bio {
      font-size: 14px;
      color: var(--ink-mid);
      line-height: 1.7;
      max-width: 340px;
      margin-bottom: 16px;
    }

    .tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
      list-style: none;
    }

    .tag {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      color: var(--tag-text);
      background: var(--accent-bg);
      border: 1px solid #C3D0F0;
      padding: 4px 10px;
      border-radius: 20px;
      letter-spacing: 0.04em;
    }

    /* ── SECTION LABEL ───────────────────────────────────────────────────── */
    .section-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin: 24px 0 8px 2px;
    }

    /* ── LINK CARDS ──────────────────────────────────────────────────────── */
    .links-list { list-style: none; }
    .links-list li { margin-bottom: 7px; }

    .link-item {
      display: flex;
      align-items: center;
      gap: 13px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 13px 16px;
      text-decoration: none;
      color: var(--ink);
      transition: border-color 0.14s, box-shadow 0.14s, transform 0.14s;
      animation: fadeUp 0.45s ease both;
      position: relative;
    }

    .link-item:hover {
      border-color: var(--accent);
      box-shadow: 0 4px 18px rgba(36, 85, 200, 0.10);
      transform: translateY(-1px);
    }

    /* WCAG 2.4.7 — visible focus, ≥2px offset */
    .link-item:focus-visible {
      outline: 2px solid var(--border-focus);
      outline-offset: 3px;
      border-color: var(--border-focus);
    }

    .link-icon {
      width: 38px;
      height: 38px;
      border-radius: var(--radius-sm);
      background: var(--surface2);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
    }

    .link-body { flex: 1; min-width: 0; }

    .link-label {
      font-family: 'DM Mono', monospace;
      font-size: 13.5px;
      font-weight: 500;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: block;
    }

    .link-desc {
      font-family: 'Lora', serif;
      font-size: 12px;
      color: var(--ink-muted);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: block;
    }

    .ext-icon {
      font-size: 13px;
      color: var(--ink-muted);
      flex-shrink: 0;
      transition: color 0.14s, transform 0.14s;
    }

    .link-item:hover .ext-icon {
      color: var(--accent);
      transform: translate(2px, -2px);
    }

    .click-badge {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--ink-muted);
      flex-shrink: 0;
      min-width: 28px;
      text-align: right;
      opacity: 0;
      transition: opacity 0.18s;
    }
    .link-item:hover .click-badge,
    .click-badge.visible { opacity: 1; }

    /* ── FOOTER ──────────────────────────────────────────────────────────── */
    footer {
      margin-top: 44px;
      text-align: center;
      animation: fadeUp 0.45s ease 0.45s both;
    }

    .footer-text {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--ink-muted);
      letter-spacing: 0.03em;
    }

    .footer-text a {
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .footer-text a:hover { color: var(--accent-hover); }
    .footer-text a:focus-visible {
      outline: 2px solid var(--border-focus);
      outline-offset: 2px;
      border-radius: 2px;
    }

    /* ── TOAST (role=status + aria-live=polite) ───────────────────────────── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(72px);
      background: var(--ink);
      color: #F7F5F2;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      padding: 9px 18px;
      border-radius: 100px;
      transition: transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 200;
      white-space: nowrap;
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ── ANIMATIONS ──────────────────────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* WCAG 2.3.3 — Respect reduced-motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>

<body>

  <!-- WCAG 2.4.1 Skip link -->
  <a class="skip-link" href="#main-links">Skip to links</a>

  <div class="container">

    <!-- Profile -->
    <section aria-labelledby="profile-name">

      <div class="profile">
        <div class="avatar" aria-hidden="true">EVD</div>

        <h1 class="profile-name" id="profile-name">EasyVibeDave</h1>

        <p class="profile-handle">
          <a href="https://x.com/davelab7" target="_blank" rel="noopener noreferrer"
             aria-label="Twitter profile @davelab7 (opens in new tab)">@davelab7</a>
          &nbsp;·&nbsp; by
          <a href="https://x.com/ishiid" target="_blank" rel="noopener noreferrer"
             aria-label="Twitter profile @ishiid (opens in new tab)">@ishiid</a>
        </p>

        <p class="profile-bio">
          Building AI dev tools in public.<br>
          Sharing practical tips, experiments, and lessons learned.
        </p>

        <ul class="tags" role="list" aria-label="Topics">
          <li class="tag" role="listitem">#BuildInPublic</li>
          <li class="tag" role="listitem">#AITools</li>
          <li class="tag" role="listitem">#DevTools</li>
          <li class="tag" role="listitem">#VibeCoding</li>
        </ul>
      </div>

    </section>

    <!-- Main links -->
    <main id="main-links" aria-label="Links"></main>

    <!-- Footer -->
    <footer aria-label="Site info">
      <p class="footer-text">
        Made with
        <a href="#" aria-label="EasyVibeDave link page builder">EasyVibeDave</a>
        · open source
      </p>
    </footer>

  </div>

  <!-- Polite live region for toast (WCAG 4.1.3) -->
  <div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>

<script>
  // ─── CONFIG ────────────────────────────────────────────────────────────────
  const SECTIONS = [
    {
      label: "Projects",
      links: [
        { icon: "⚡", label: "EasyVibeDave",      desc: "AI dev tools, shipped fast",               url: "#" },
        { icon: "🌐", label: "Kiara Translator",  desc: "Slack translation plugin · #2 globally",    url: "https://kiara.bz" },
        { icon: "🔐", label: "Kiara Lab",         desc: "Post-quantum cryptography R&D",             url: "https://kiara.bz" },
      ],
    },
    {
      label: "Writing & Tips",
      links: [
        { icon: "📝", label: "Latest Posts",    desc: "Practical AI experiments & learnings",   url: "#" },
        { icon: "🧵", label: "Thread Archive",  desc: "Best threads on building AI tools",      url: "#" },
      ],
    },
    {
      label: "Find Me",
      links: [
        { icon: "🐦", label: "Twitter / X",  desc: "@davelab7 · building in public",   url: "https://x.com/davelab7" },
        { icon: "🐙", label: "GitHub",       desc: "Open-source AI tools & SDKs",      url: "https://github.com" },
        { icon: "💼", label: "LinkedIn",     desc: "Kiara Inc. · Tokyo",                url: "https://linkedin.com" },
      ],
    },
  ];
  // ───────────────────────────────────────────────────────────────────────────

  const clicks = {};
  let toastTimer;

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
  }

  function buildLinks() {
    const main = document.getElementById('main-links');
    let idx = 0;

    SECTIONS.forEach((section) => {
      const labelEl = document.createElement('p');
      labelEl.className = 'section-label';
      labelEl.textContent = section.label;
      labelEl.setAttribute('aria-hidden', 'true');
      main.appendChild(labelEl);

      const ul = document.createElement('ul');
      ul.className = 'links-list';
      ul.setAttribute('role', 'list');
      ul.setAttribute('aria-label', section.label + ' links');

      section.links.forEach((link) => {
        const i = idx++;
        const key = link.url + '__' + i;
        const ext = link.url.startsWith('http');

        const li = document.createElement('li');

        const a = document.createElement('a');
        a.className = 'link-item';
        a.href = link.url;
        a.setAttribute('aria-label', link.label + (ext ? ' (opens in new tab)' : ''));
        if (ext) { a.target = '_blank'; a.rel = 'noopener noreferrer'; }
        a.style.animationDelay = (0.08 + i * 0.055) + 's';

        const iconEl = document.createElement('span');
        iconEl.className = 'link-icon';
        iconEl.setAttribute('aria-hidden', 'true');
        iconEl.textContent = link.icon;

        const body = document.createElement('span');
        body.className = 'link-body';

        const labelSpan = document.createElement('span');
        labelSpan.className = 'link-label';
        labelSpan.textContent = link.label;

        const descSpan = document.createElement('span');
        descSpan.className = 'link-desc';
        descSpan.textContent = link.desc;

        body.appendChild(labelSpan);
        body.appendChild(descSpan);

        const badge = document.createElement('span');
        badge.className = 'click-badge';
        badge.id = 'badge-' + i;
        badge.setAttribute('aria-hidden', 'true');

        const arrow = document.createElement('span');
        arrow.className = 'ext-icon';
        arrow.setAttribute('aria-hidden', 'true');
        arrow.textContent = ext ? '↗' : '→';

        a.appendChild(iconEl);
        a.appendChild(body);
        a.appendChild(badge);
        a.appendChild(arrow);

        a.addEventListener('click', () => {
          clicks[key] = (clicks[key] || 0) + 1;
          const b = document.getElementById('badge-' + i);
          if (b) { b.textContent = clicks[key] + '×'; b.classList.add('visible'); }
          showToast('Opening ' + link.label + '…');
        });

        let pressTimer;
        a.addEventListener('pointerdown', () => {
          pressTimer = setTimeout(() => {
            navigator.clipboard?.writeText(link.url).then(() => showToast('Link copied ✓'));
          }, 600);
        });
        ['pointerup','pointermove','pointercancel'].forEach(ev =>
          a.addEventListener(ev, () => clearTimeout(pressTimer))
        );

        li.appendChild(a);
        ul.appendChild(li);
      });

      main.appendChild(ul);
    });
  }

  buildLinks();
</script>
</body>
</html>
